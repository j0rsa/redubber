name: CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - 'frontend/eslint.config.*'
      - 'frontend/.storybook/**'
      - 'Dockerfile'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'poetry.lock'
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/vite.config.ts'
      - 'frontend/tsconfig*.json'
      - 'frontend/eslint.config.*'
      - 'frontend/.storybook/**'
      - 'Dockerfile'
      - '.github/workflows/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Version guard (main push only)
  # ─────────────────────────────────────────────
  version-check:
    name: Version check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: read
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract version from pyproject.toml
        id: ver
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: v${VERSION}"

      - name: Check tag does not already exist in GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://ghcr.io/v2/${OWNER}/${REPO}/manifests/v${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "::error::Tag v${VERSION} already exists in GHCR. Bump the version in pyproject.toml before merging."
            exit 1
          fi
          echo "Tag v${VERSION} is free — proceeding."

  # ─────────────────────────────────────────────
  # Stream 1: Frontend build + test
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (build + test)
    runs-on: ubuntu-latest
    needs: version-check
    if: always() && !failure() && !cancelled()
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Test (Storybook + Vitest)
        run: npx vitest run

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Stream 1b: Storybook publish (Chromatic)
  # Requires CHROMATIC_PROJECT_TOKEN repo secret.
  # ─────────────────────────────────────────────
  chromatic:
    name: Storybook (Chromatic)
    runs-on: ubuntu-latest
    needs: frontend
    if: always() && needs.frontend.result == 'success'
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        id: chromatic
        uses: chromaui/action@v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: frontend
          buildScriptName: build-storybook
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update PR description with Storybook preview
        if: github.event_name == 'pull_request' && steps.chromatic.outputs.storybookUrl != ''
        uses: actions/github-script@v7
        with:
          script: |
            const markerStart = '<!-- chromatic-storybook-preview -->';
            const markerEnd = '<!-- /chromatic-storybook-preview -->';
            const storybookUrl = '${{ steps.chromatic.outputs.storybookUrl }}';
            const buildUrl = '${{ steps.chromatic.outputs.buildUrl }}';
            const sha = '${{ github.event.pull_request.head.sha }}';
            const section = [
              markerStart,
              '## Storybook preview',
              '',
              `- [View Storybook](${storybookUrl})`,
              `- [View Chromatic build](${buildUrl})`,
              '',
              `_Updated for commit ${sha}._`,
              markerEnd,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            let body = pr.body ?? '';
            const startIdx = body.indexOf(markerStart);
            const endIdx = body.indexOf(markerEnd);

            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              body =
                body.slice(0, startIdx) +
                section +
                body.slice(endIdx + markerEnd.length);
            } else {
              body = `${body.trimEnd()}\n\n${section}`;
            }

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body,
            });

  # ─────────────────────────────────────────────
  # Stream 2: Backend lint + type check
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend (lint + typecheck)
    runs-on: ubuntu-latest
    needs: version-check
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry==1.8.0

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --only main,dev --no-interaction

      - name: Lint
        run: poetry run ruff check .

  # ─────────────────────────────────────────────
  # Stream 2: Backend tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend (test)
    runs-on: ubuntu-latest
    needs: backend-check
    if: always() && needs.backend-check.result == 'success'
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry==1.8.0

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --only main,dev --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Final: Docker image
  # ─────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: [frontend, backend-test, version-check]
    if: |
      always() &&
      needs.frontend.result == 'success' &&
      needs.backend-test.result == 'success' &&
      !cancelled()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract app version
        id: ver
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v${{ steps.ver.outputs.version }},enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            type=sha,prefix=pr-${{ github.event.pull_request.number }}-${{ steps.ver.outputs.version }}-,format=short,enable=${{ github.event_name == 'pull_request' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'pull_request' || (github.ref == 'refs/heads/main' && github.event_name == 'push') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
