version: '3.8'

services:
  redubber:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redubber-v2
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/config
    environment:
      # Config directory — redubber.db and settings.json stored here
      - REDUBBER_CONFIG_PATH=/config

      # OpenAI Configuration (required)
      - OPENAI_API_KEY=${OPENAI_API_KEY}

      # Task Queue Configuration
      - MAX_CONCURRENT_REDUBS=${MAX_CONCURRENT_REDUBS:-1}
      - TASK_QUEUE_MAX_SIZE=${TASK_QUEUE_MAX_SIZE:-100}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # API Configuration
      - API_TITLE=${API_TITLE:-Redubber API}
      - API_VERSION=${API_VERSION:-2.0.1}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
